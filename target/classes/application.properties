# ===== SERVER =====
server.port=8080

# ===== DATABASE =====
spring.datasource.url=jdbc:mysql://localhost:3306/whitebeard_cafe?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=root
spring.datasource.password=1405
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=false

# ===== STATIC FRONTEND =====
spring.web.resources.static-locations=classpath:/static/
spring.mvc.static-path-pattern=/**

# ===== LOGGING =====
logging.level.com.thewhitebeard=INFO

# ===== JWT =====
jwt.secret=${JWT_SECRET:WhiteBeardCafeSecretKey2024SuperLongKeyForHMACSHA256AlgorithmMinimum32Chars}
jwt.expiration=${JWT_EXPIRATION:86400000}
